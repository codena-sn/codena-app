<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1F5039" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Tâches YMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#ECF0E9; --surface:#FFFFFF; --surface-2:#F5F8F3; --line:#DCE3D8;
    --ink:#15201B; --muted:#62726A; --brand:#1F5039; --brand-press:#173E2C;
    --brand-soft:#DBE9DF; --urgent:#B6492B;
    --r:14px; --r-sm:10px;
    --fd:"Bricolage Grotesque","Segoe UI",system-ui,sans-serif;
    --fu:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  html,body{margin:0;padding:0;}
  body{font-family:var(--fu);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px calc(70px + env(safe-area-inset-bottom));min-height:100vh;}

  header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:42px;height:42px;border-radius:11px;flex:0 0 auto;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:15px;letter-spacing:.5px;box-shadow:0 2px 8px rgba(31,80,57,.25);}
  h1{font-family:var(--fd);font-weight:700;font-size:22px;margin:0;letter-spacing:-.3px;line-height:1.1;}
  .sub{color:var(--muted);font-size:13px;margin-top:2px;}
  .export{border:1px solid var(--line);background:var(--surface);color:var(--brand);font-family:var(--fu);font-weight:600;font-size:13px;padding:8px 12px;border-radius:10px;cursor:pointer;flex:0 0 auto;}
  .export:active{background:var(--surface-2);}

  .progress{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:16px;}
  .ptop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:9px;}
  .pcount{font-family:var(--fd);font-weight:700;font-size:15px;}
  .pright{display:flex;align-items:center;gap:8px;}
  .plabel{color:var(--muted);font-size:12px;}
  .pill{font-size:11px;font-weight:700;color:var(--urgent);background:#FBEFE9;border:1px solid #F0D6CC;padding:2px 8px;border-radius:99px;}
  .bar{height:8px;background:var(--surface-2);border-radius:99px;overflow:hidden;border:1px solid var(--line);}
  .fill{height:100%;background:var(--brand);border-radius:99px;transition:width .4s ease;}

  .add{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:18px;}
  #newTask{width:100%;border:1.5px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;font-family:var(--fu);font-size:16px;color:var(--ink);background:var(--surface-2);}
  #newTask::placeholder{color:#9aa79f;}
  #newTask:focus{outline:none;border-color:var(--brand);background:#fff;}
  .catchips{display:flex;gap:8px;overflow-x:auto;padding:11px 0 3px;scrollbar-width:none;}
  .catchips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;white-space:nowrap;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-family:var(--fu);font-weight:600;font-size:13px;padding:8px 13px;border-radius:99px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .chip .d{width:8px;height:8px;border-radius:99px;background:currentColor;opacity:.55;}
  .addrow{display:flex;gap:9px;margin-top:11px;}
  .opt{flex:1;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-family:var(--fu);font-weight:600;font-size:14px;padding:11px;border-radius:var(--r-sm);cursor:pointer;}
  .opt.on{background:#FBEFE9;border-color:var(--urgent);color:var(--urgent);}
  .date{flex:1;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-family:var(--fu);font-size:14px;padding:10px 11px;border-radius:var(--r-sm);min-width:0;}
  .date:focus,.opt:focus{outline:none;border-color:var(--brand);}
  .primary{width:100%;margin-top:11px;border:none;background:var(--brand);color:#fff;font-family:var(--fd);font-weight:700;font-size:16px;padding:14px;border-radius:var(--r-sm);cursor:pointer;box-shadow:0 2px 8px rgba(31,80,57,.22);}
  .primary:active{background:var(--brand-press);}

  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;margin-bottom:2px;}
  .filters::-webkit-scrollbar{display:none;}
  .fchip{flex:0 0 auto;white-space:nowrap;border:1.5px solid var(--line);background:var(--surface);color:var(--muted);font-family:var(--fu);font-weight:600;font-size:13px;padding:8px 13px;border-radius:99px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .fchip.on{background:var(--brand);border-color:var(--brand);color:#fff;}
  .fchip .d{width:8px;height:8px;border-radius:99px;}
  .fchip .n{font-size:12px;opacity:.7;font-weight:700;}

  #list{display:flex;flex-direction:column;gap:9px;}
  .task{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px;display:flex;align-items:flex-start;gap:12px;}
  .task.over{border-color:#F0D6CC;}
  .check{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:2px solid #C5CFC2;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;margin-top:1px;}
  .check.on{background:var(--brand);border-color:var(--brand);}
  .tbody{flex:1;min-width:0;cursor:pointer;}
  .ttext{font-size:15.5px;font-weight:500;color:var(--ink);word-wrap:break-word;}
  .task.done .ttext{text-decoration:line-through;color:#9aa79f;font-weight:400;}
  .tmeta{display:flex;flex-wrap:wrap;align-items:center;gap:5px 10px;margin-top:6px;font-size:12px;color:var(--muted);}
  .tmeta .cat{display:flex;align-items:center;gap:5px;font-weight:600;}
  .tmeta .dot{width:8px;height:8px;border-radius:99px;}
  .flag{color:var(--urgent);font-weight:700;}
  .due{font-weight:600;}
  .due.over{color:var(--urgent);}
  .del{flex:0 0 auto;border:none;background:transparent;color:#bcc6bd;font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;margin-top:1px;}
  .del:active{color:var(--urgent);}

  .donehead{display:flex;justify-content:space-between;align-items:center;margin:20px 2px 9px;}
  .donehead h2{font-family:var(--fd);font-weight:700;font-size:14px;margin:0;color:var(--muted);}
  .clear{border:none;background:transparent;color:var(--muted);font-family:var(--fu);font-weight:600;font-size:13px;cursor:pointer;text-decoration:underline;}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 16px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);}
  .foot{text-align:center;color:#9aa79f;font-size:11.5px;margin-top:24px;}

  .overlay{position:fixed;inset:0;background:rgba(21,32,27,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  .sheet{background:var(--bg);width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));max-height:85vh;display:flex;flex-direction:column;}
  .sheet h3{font-family:var(--fd);font-weight:700;font-size:18px;margin:0 0 4px;}
  .sheet p{color:var(--muted);font-size:13px;margin:0 0 12px;}
  .sheet textarea{width:100%;flex:1;min-height:180px;border:1px solid var(--line);border-radius:var(--r);padding:13px;font-family:var(--fu);font-size:13.5px;color:var(--ink);background:#fff;resize:none;}
  .sheetrow{display:flex;gap:9px;margin-top:13px;}
  .sheetrow button{flex:1;padding:13px;border-radius:var(--r-sm);font-family:var(--fd);font-weight:700;font-size:15px;cursor:pointer;border:1px solid var(--line);}
  .copy{background:var(--brand);color:#fff;border-color:var(--brand)!important;}
  .close{background:#fff;color:var(--ink);}
  .backup{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
  .backuplabel{display:block;color:var(--muted);font-size:12px;margin-bottom:9px;}
  .save{background:var(--surface-2);color:var(--brand);border-color:var(--line)!important;}
  .restore{background:#fff;color:var(--ink);}

  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark">YMS</div>
      <div>
        <h1>Mes tâches</h1>
        <div class="sub">Pilotage de l'activité</div>
      </div>
    </div>
    <button class="export" id="exportBtn">Exporter</button>
  </header>

  <div class="progress" id="progressZone"></div>

  <section class="add">
    <input id="newTask" type="text" placeholder="Nouvelle tâche…" aria-label="Nouvelle tâche" autocomplete="off" />
    <div class="catchips" id="catChips"></div>
    <div class="addrow">
      <button class="opt" id="prioBtn">☆ Priorité</button>
      <input class="date" id="due" type="date" aria-label="Échéance (optionnelle)" />
    </div>
    <button class="primary" id="addBtn">Ajouter</button>
  </section>

  <div class="filters" id="filterZone"></div>
  <div id="list"></div>

  <div class="foot">Enregistré automatiquement sur ce téléphone · ajoute, coche, c'est fait.</div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h3>Exporter mes tâches</h3>
    <p>Copie cette liste pour la coller dans Notes, Rappels ou un email.</p>
    <textarea id="exportText" readonly></textarea>
    <div class="sheetrow">
      <button class="close" id="closeBtn">Fermer</button>
      <button class="copy" id="copyBtn">Tout copier</button>
    </div>
    <div class="backup">
      <span class="backuplabel">Sauvegarde complète (transfert vers un autre appareil)</span>
      <div class="sheetrow">
        <button class="restore" id="restoreBtn">Restaurer un fichier</button>
        <button class="save" id="saveBtn">Sauvegarder (.json)</button>
      </div>
    </div>
    <input id="importFile" type="file" accept="application/json,.json" hidden />
  </div>
</div>

<script>
(function(){
  "use strict";
  var KEY = "yms_todo_v2";

  var CAT_ORDER = ["commercial","admin","strategie","site","formation"];
  var CATS = {
    commercial: {label:"Commercial",         color:"#2F7A57"},
    admin:      {label:"Admin & gestion",     color:"#4C5C92"},
    strategie:  {label:"Stratégie & réseau",  color:"#A9762A"},
    site:       {label:"Site & com",          color:"#84517F"},
    formation:  {label:"Formation",           color:"#2C6E86"}
  };

  var tasks = [];
  var filter = "all";
  var addCat = "commercial";
  var addPrio = false;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function todayStr(){
    var d=new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function fmtDue(s){
    try{ var d=new Date(s+"T00:00:00");
      return new Intl.DateTimeFormat("fr-FR",{day:"numeric",month:"short"}).format(d);
    }catch(e){ return s; }
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });}
  function isOver(t){ return t.due && !t.done && t.due < todayStr(); }

  function seed(){
    var raw = [
      ["Envoyer la lettre d'observations + remise gracieuse au SIE (TVA, 397 €)","admin",true,"2026-06-22"],
      ["Point comptable avec Gérard Benhamou (charges externes)","admin",false,"2026-06-24"],
      ["Finaliser et envoyer le chiffrage Emmaüs Habitat (PDF)","commercial",true,"2026-06-23"],
      ["Appeler les syndics du Mantois (Exelia, Soupizet, Foncia, Agecogestion)","commercial",false,"2026-06-23"],
      ["Prospecter Les Résidences Yvelines Essonne (servicemarches@lesresidences.fr)","commercial",false,"2026-06-24"],
      ["Lancer la prospection des marchés publics < 40 k€ (Mantois)","commercial",false,"2026-06-25"],
      ["Relancer Mme Ellili (Délos 78) si pas de réponse","commercial",false,"2026-06-26"],
      ["Relancer Foncia Boucles de Seine si pas de réponse","commercial",false,"2026-06-26"],
      ["Explorer la sous-traitance (Elior / attributaire UVSQ Lot 2)","commercial",false,"2026-07-07"],
      ["Envoyer au maire le Kbis + la liste de matériel","strategie",false,"2026-06-23"],
      ["Finaliser l'ordre du jour + caler la date du RDV avec le maire","strategie",false,"2026-06-25"],
      ["Préparer l'entretien rupture conventionnelle (ECF)","strategie",false,"2026-06-27"],
      ["Publier l'annonce — commercial / agent de prospection","strategie",false,"2026-07-02"],
      ["Changer le mot de passe WordPress (sécurité)","site",true,"2026-06-22"],
      ["Corriger le site WordPress (SEO, bouton Postuler, horaires, témoignages, Google Maps, slogan)","site",false,"2026-06-24"],
      ["Dossier CPF + shortlister 2-3 sessions (CCE gestion TPE-PME, CCI)","formation",false,"2026-07-01"]
    ];
    return raw.map(function(r,i){
      return {id:uid(), text:r[0], cat:r[1], prio:r[2], due:r[3], done:false, created:Date.now()+i};
    });
  }

  // --- Persistance via localStorage (fonctionne hors-ligne, sur le téléphone) ---
  function load(){
    try{
      var raw = window.localStorage.getItem(KEY);
      if(raw){ tasks = JSON.parse(raw); }
      else { tasks = seed(); save(); }
    }catch(e){ tasks = seed(); }
    render();
  }
  function save(){
    try{ window.localStorage.setItem(KEY, JSON.stringify(tasks)); }catch(e){}
  }
  function persist(){ save(); render(); }

  var catChips = document.getElementById("catChips");
  function buildCatChips(){
    catChips.innerHTML = "";
    CAT_ORDER.forEach(function(c){
      var b = document.createElement("button");
      b.className = "chip"; b.setAttribute("data-cat", c);
      b.innerHTML = '<span class="d"></span>' + esc(CATS[c].label);
      b.style.color = CATS[c].color;
      b.addEventListener("click", function(){ addCat=c; styleCatChips(); });
      catChips.appendChild(b);
    });
    styleCatChips();
  }
  function styleCatChips(){
    Array.prototype.forEach.call(catChips.children, function(b){
      var c=b.getAttribute("data-cat"), col=CATS[c].color;
      if(c===addCat){ b.style.background=col+"1A"; b.style.borderColor=col; b.style.color=col; }
      else{ b.style.background="#fff"; b.style.borderColor="var(--line)"; b.style.color="var(--muted)"; }
    });
  }

  var prioBtn=document.getElementById("prioBtn");
  prioBtn.addEventListener("click", function(){
    addPrio=!addPrio;
    prioBtn.classList.toggle("on",addPrio);
    prioBtn.textContent=(addPrio?"★":"☆")+" Priorité";
  });

  var input=document.getElementById("newTask");
  var dueIn=document.getElementById("due");
  function addTask(){
    var t=input.value.trim(); if(!t) return;
    tasks.push({id:uid(),text:t,cat:addCat,prio:addPrio,due:(dueIn.value||null),done:false,created:Date.now()});
    input.value=""; dueIn.value=""; addPrio=false;
    prioBtn.classList.remove("on"); prioBtn.textContent="☆ Priorité";
    persist(); input.focus();
  }
  document.getElementById("addBtn").addEventListener("click",addTask);
  input.addEventListener("keydown",function(e){ if(e.key==="Enter") addTask(); });

  var progressZone=document.getElementById("progressZone");
  var filterZone=document.getElementById("filterZone");
  var list=document.getElementById("list");

  function openCount(cat){ return tasks.filter(function(t){return !t.done && (cat==="all"||t.cat===cat);}).length; }

  function render(){
    var total=tasks.length;
    var done=tasks.filter(function(t){return t.done;}).length;
    var over=tasks.filter(isOver).length;
    var pct=total?Math.round(done/total*100):0;
    progressZone.innerHTML=
      '<div class="ptop"><span class="pcount">'+done+' / '+total+' faites</span>'+
      '<span class="pright">'+(over>0?'<span class="pill">'+over+' en retard</span>':'')+
      '<span class="plabel">'+(total-done)+' en attente</span></span></div>'+
      '<div class="bar"><div class="fill" style="width:'+pct+'%"></div></div>';

    var fhtml='<button class="fchip '+(filter==="all"?"on":"")+'" data-f="all">Tout <span class="n">'+openCount("all")+'</span></button>';
    CAT_ORDER.forEach(function(c){
      var n=openCount(c);
      fhtml+='<button class="fchip '+(filter===c?"on":"")+'" data-f="'+c+'">'+
        '<span class="d" style="background:'+CATS[c].color+'"></span>'+esc(CATS[c].label)+
        (n>0?' <span class="n">'+n+'</span>':'')+'</button>';
    });
    filterZone.innerHTML=fhtml;

    var seln=tasks.filter(function(t){return filter==="all"||t.cat===filter;});
    var open=seln.filter(function(t){return !t.done;});
    var fin=seln.filter(function(t){return t.done;});
    open.sort(function(a,b){
      if(a.prio!==b.prio) return a.prio?-1:1;
      if(a.due&&b.due){ if(a.due!==b.due) return a.due<b.due?-1:1; }
      else if(a.due&&!b.due) return -1;
      else if(!a.due&&b.due) return 1;
      return a.created-b.created;
    });
    fin.sort(function(a,b){return b.created-a.created;});

    var html="";
    if(open.length===0){
      html+='<div class="empty">'+(total===0?"Aucune tâche pour l'instant.<br>Ajoute la première au-dessus."
        :(fin.length>0?"Rien en attente ici — tout est traité.":"Aucune tâche dans cette catégorie."))+'</div>';
    } else { open.forEach(function(t){ html+=row(t); }); }
    if(fin.length){
      html+='<div class="donehead"><h2>Terminées ('+fin.length+')</h2><button class="clear" data-action="clear">Vider</button></div>';
      fin.forEach(function(t){ html+=row(t); });
    }
    list.innerHTML=html;
  }

  function row(t){
    var c=CATS[t.cat]||{label:"—",color:"#888"};
    var over=isOver(t);
    var check=t.done?'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>':"";
    var meta='<span class="cat"><span class="dot" style="background:'+c.color+'"></span>'+esc(c.label)+'</span>';
    if(t.prio&&!t.done) meta+='<span class="flag">Priorité</span>';
    if(t.due) meta+='<span class="due'+(over?" over":"")+'">'+fmtDue(t.due)+(over?" · en retard":"")+'</span>';
    return '<div class="task'+(t.done?" done":"")+(over?" over":"")+'" data-id="'+t.id+'">'+
      '<button class="check'+(t.done?" on":"")+'" data-action="toggle" data-id="'+t.id+'" aria-label="'+(t.done?"Marquer à faire":"Marquer comme fait")+'">'+check+'</button>'+
      '<div class="tbody" data-action="toggle" data-id="'+t.id+'"><div class="ttext">'+esc(t.text)+'</div><div class="tmeta">'+meta+'</div></div>'+
      '<button class="del" data-action="del" data-id="'+t.id+'" aria-label="Supprimer">✕</button></div>';
  }

  filterZone.addEventListener("click",function(e){
    var b=e.target.closest("[data-f]"); if(!b) return;
    filter=b.getAttribute("data-f"); render();
  });
  list.addEventListener("click",function(e){
    var el=e.target.closest("[data-action]"); if(!el) return;
    var act=el.getAttribute("data-action");
    if(act==="clear"){ tasks=tasks.filter(function(t){return !t.done;}); persist(); return; }
    var id=el.getAttribute("data-id");
    if(act==="toggle"){ tasks.forEach(function(t){ if(t.id===id) t.done=!t.done; }); persist(); }
    else if(act==="del"){ tasks=tasks.filter(function(t){return t.id!==id;}); persist(); }
  });

  var overlay=document.getElementById("overlay");
  var exportText=document.getElementById("exportText");
  function buildExport(){
    var lines=["YMS — Mes tâches",""];
    CAT_ORDER.forEach(function(c){
      var items=tasks.filter(function(t){return t.cat===c;});
      if(!items.length) return;
      lines.push("— "+CATS[c].label.toUpperCase()+" —");
      items.forEach(function(t){
        lines.push((t.done?"[x] ":"[ ] ")+t.text+(t.due?" (éch. "+fmtDue(t.due)+")":"")+(t.prio&&!t.done?"  ★":""));
      });
      lines.push("");
    });
    return lines.join("\n");
  }
  document.getElementById("exportBtn").addEventListener("click",function(){ exportText.value=buildExport(); overlay.classList.add("show"); });
  document.getElementById("closeBtn").addEventListener("click",function(){ overlay.classList.remove("show"); });
  overlay.addEventListener("click",function(e){ if(e.target===overlay) overlay.classList.remove("show"); });
  document.getElementById("copyBtn").addEventListener("click",function(){
    var btn=this;
    function ok(){ btn.textContent="Copié ✓"; setTimeout(function(){btn.textContent="Tout copier";},1500); }
    exportText.focus(); exportText.select();
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(exportText.value).then(ok).catch(function(){ try{document.execCommand("copy");ok();}catch(e){} });
    } else { try{document.execCommand("copy");ok();}catch(e){} }
  });

  // --- Sauvegarde / Restauration (fichier .json) ---
  function dateStamp(){
    var d=new Date();
    return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
  }
  document.getElementById("saveBtn").addEventListener("click",function(){
    try{
      var payload={app:"yms_todo",version:2,exported:new Date().toISOString(),tasks:tasks};
      var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url; a.download="taches-yms-"+dateStamp()+".json";
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },0);
    }catch(e){ alert("Sauvegarde impossible sur cet appareil."); }
  });

  var importFile=document.getElementById("importFile");
  document.getElementById("restoreBtn").addEventListener("click",function(){ importFile.click(); });
  importFile.addEventListener("change",function(){
    var file=importFile.files&&importFile.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(){
      try{
        var data=JSON.parse(reader.result);
        var imported=Array.isArray(data)?data:(data&&data.tasks);
        if(!Array.isArray(imported)) throw new Error("format");
        var clean=imported.filter(function(t){return t&&typeof t.text==="string";}).map(function(t){
          return {
            id:(typeof t.id==="string"&&t.id)?t.id:uid(),
            text:String(t.text),
            cat:CATS[t.cat]?t.cat:"commercial",
            prio:!!t.prio,
            due:(typeof t.due==="string"&&t.due)?t.due:null,
            done:!!t.done,
            created:(typeof t.created==="number")?t.created:Date.now()
          };
        });
        if(!confirm("Remplacer vos "+tasks.length+" tâche(s) actuelle(s) par les "+clean.length+" tâche(s) du fichier ?")) return;
        tasks=clean; persist();
        overlay.classList.remove("show");
        alert(clean.length+" tâche(s) restaurée(s).");
      }catch(e){ alert("Fichier invalide. Choisissez un fichier de sauvegarde .json créé par cette application."); }
      finally{ importFile.value=""; }
    };
    reader.onerror=function(){ alert("Lecture du fichier impossible."); importFile.value=""; };
    reader.readAsText(file);
  });

  buildCatChips();
  load();
})();
</script>
</body>
</html>
